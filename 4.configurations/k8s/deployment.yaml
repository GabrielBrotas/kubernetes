# replica set manage the pods to be running, if the pod drop for some reason it will be generated again
apiVersion: apps/v1
kind: Deployment

metadata:
  name: goserver
  labels:
    app: goserver
  
spec:
  selector: 
    matchLabels:
      app: goserver
  # 2 pods running
  replicas: 1

  # pod template that we want running in our replica set
  template:
    metadata:
      labels:
        app: "goserver"
    spec:
      containers:
        - name: "goserver"
          image: gbrotas/go-hello:v5
          env:
            - name: NAME
              # first method => Hardcode
              # value: "Gabriel" 
              
              #second method
              valueFrom:
                configMapKeyRef:
                  name: goserver-env
                  key: NAME

            - name: AGE
              # value: "21" # first method
              valueFrom:
                configMapKeyRef:
                  name: goserver-env
                  key: AGE
